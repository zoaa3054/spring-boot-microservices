spring.application.name=ratings-data-service
server.port=8083

spring.datasource.url=${RATINGS_DB_URL:jdbc:mysql://localhost:3306/movie_ratings?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${RATINGS_DB_USER:root}
spring.datasource.password=${RATINGS_DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
