spring.application.name=trending-movies-service
server.port=8084
grpc.server.port=9090

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.datasource.url=${TRENDING_DB_URL:jdbc:mysql://localhost:3306/movie_ratings?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${TRENDING_DB_USER:root}
spring.datasource.password=${TRENDING_DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

